name: Valid Store File

model: |
  model
    schema 1.1
  type user
  type organization
    relations
      define member: [user]

tuples:
  - user: user:daniel
    relation: member
    object: organization:auth0
tests:
  - name: Tests for organization members
    check:
      - user: user:daniel
        object: organization:auth0
        assertions:
          member: true
