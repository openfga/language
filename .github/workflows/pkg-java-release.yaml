name: Release (Java)

on:
  workflow_dispatch:
  push:
    tags:
      - "pkg/java/v*"

jobs:
  test:
    permissions:
      contents: read
    uses: ./.github/workflows/pkg-java-build.yaml
    secrets: inherit

  publish-maven-central:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: "pkg/java"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          path: "."
          sparse-checkout: "pkg/java"
          sparse-checkout-cone-mode: false

      - name: Set up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: 11
          distribution: "temurin"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-provider: basic # Use the open-source basic cache provider

        # Tasks created by https://github.com/gradle-nexus/publish-plugin
      - name: Publish package
        run: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_SIGNINGKEY: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_SIGNINGPASSWORD: ${{ secrets.GPG_PASSPHRASE }}

  publish-github-packages:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: "pkg/java"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          path: "."
          sparse-checkout: "pkg/java"
          sparse-checkout-cone-mode: false

      - name: Set up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: 11
          distribution: "temurin"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-provider: basic # Use the open-source basic cache provider

      # Tasks created by https://docs.gradle.org/current/userguide/publishing_maven.html
      - name: Publish package
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_SIGNINGKEY: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_SIGNINGPASSWORD: ${{ secrets.GPG_PASSPHRASE }}

  # The release-please post-release job already created a draft GitHub release
  # (CHANGELOG notes + auto-generated notes) when it pushed this tag. Publish
  # (undraft) it only after both Maven publishes above have succeeded.
  finalize-release:
    runs-on: ubuntu-latest
    needs: [publish-maven-central, publish-github-packages]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write # publish (undraft) the github release
    steps:
      - name: Publish the draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # The draft is created right after the tag is pushed; wait briefly in
          # case this job gets there first.
          for _ in $(seq 1 10); do
            if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
              break
            fi
            echo "Waiting for draft release $TAG ..."
            sleep 6
          done
          gh release edit "$TAG" --repo "$REPO" --draft=false

  # Once the release is published, open a bump PR against downstream consumers
  # of dev.openfga:openfga-language.
  downstream-bump:
    needs: [finalize-release]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target-repo:
          - openfga/intellij-plugin
    uses: ./.github/workflows/reusable-downstream-bump.yaml
    with:
      target-repo: ${{ matrix.target-repo }}
      ecosystem: java
      version: ${{ github.ref_name }}
      artifact: openfga-language
    secrets:
      RELEASER_APP_CLIENT_ID: ${{ secrets.RELEASER_APP_CLIENT_ID }}
      RELEASER_APP_PRIVATE_KEY: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
