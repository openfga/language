name: Release (JS)

on:
  workflow_dispatch:
  push:
    tags:
      - "pkg/js/v*"

env:
  TARGET_NODE_VERSION: '24.x'

jobs:
  test:
    permissions:
      contents: read
    uses: ./.github/workflows/pkg-js-build.yaml
    secrets: inherit

  publish:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: "pkg/js"

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          path: "."
          ## TODO: We need to comment these out b/c we are copying the main README as part of the publish process
          ##       Once we have a README specific to the JS package, we can re-include them
          # sparse-checkout: "pkg/js"
          # sparse-checkout-cone-mode: false

      - name: Set up node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.TARGET_NODE_VERSION }}
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
          scope: "@openfga"
          cache-dependency-path: ./pkg/js/package-lock.json 

      - name: Install dependencies
        run: npm ci

      - name: Validate tag and determine npm tag
        id: npm-tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG="${TAG#pkg/js/}"

          # Validate tag format
          if [[ ! "$TAG" =~ ^v[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+(-(alpha|beta|rc)\.[[:digit:]]+)?$ ]]; then
            echo "Error: Tag '$TAG' does not match the required format"
            echo "Valid formats:"
            echo "  - v1.2.3"
            echo "  - v1.2.3-alpha.1"
            echo "  - v1.2.3-beta.1"
            echo "  - v1.2.3-rc.1"
            exit 1
          fi

          # Determine npm tag
          VERSION="${TAG#v}"
          if [[ "$VERSION" =~ -alpha ]]; then
            echo "tag=alpha" >> $GITHUB_OUTPUT
          elif [[ "$VERSION" =~ -beta ]]; then
            echo "tag=beta" >> $GITHUB_OUTPUT
          elif [[ "$VERSION" =~ -rc ]]; then
            echo "tag=rc" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        run: npx -y npm@11.9.0 publish --tag ${{ steps.npm-tag.outputs.tag }}

  # The release-please post-release job already created a draft GitHub release
  # (CHANGELOG notes + auto-generated notes) when it pushed this tag. Publish
  # (undraft) it only after the npm publish above has succeeded.
  finalize-release:
    runs-on: ubuntu-latest
    needs: [publish]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write # publish (undraft) the github release
    steps:
      - name: Publish the draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # The draft is created right after the tag is pushed; wait briefly in
          # case this job gets there first.
          for _ in $(seq 1 10); do
            if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
              break
            fi
            echo "Waiting for draft release $TAG ..."
            sleep 6
          done
          gh release edit "$TAG" --repo "$REPO" --draft=false
